<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}ჩემი საიტი{% endblock %}</title>
<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', 'Poppins', sans-serif;
}

body {
    background: radial-gradient(circle at top, #0a0011 0%, #130022 100%);
    color: #f5eaff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
}

header {
    background: linear-gradient(90deg, #a200ff, #5a00b3, #1a001f);
    color: white;
    text-align: center;
    width: 100%;
    padding: 25px 0;
    letter-spacing: 2px;
    text-shadow: 0 0 10px #b84dff;
    border-bottom: 3px solid #b84dff;
    box-shadow: 0 0 25px #a200ff4d;
}

nav {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    gap: 20px;
    padding: 20px;
    background: rgba(25, 0, 40, 0.9);
    border-bottom: 1px solid #3a005f;
    box-shadow: 0 2px 10px #000;
}

nav img {
    width: 150px;
    height: 100px;
    object-fit: cover;
    border-radius: 12px;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    border: 2px solid #b84dff;
}

nav img:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px #b84dff;
}

nav a {
    text-decoration: none;
    color: #c77dff;
    background: transparent;
    font-size: 1.2rem;
    padding: 8px 18px;
    border: 1px solid #c77dff;
    border-radius: 25px;
    transition: 0.3s ease;
}

nav a:hover {
    background: #c77dff;
    color: white;
    box-shadow: 0 0 15px #c77dff;
}

main {
    flex: 1;
    width: 80%;
    background: rgba(40, 0, 60, 0.8);
    margin: 30px 0;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 0 25px rgba(162, 0, 255, 0.3);
    animation: fadeIn 1s ease;
}

main h2 {
    color: #c77dff;
    text-align: center;
    margin-bottom: 20px;
    text-shadow: 0 0 8px #a200ff;
}

main ul {
    list-style: none;
    padding: 0;
}

main li {
    padding: 10px;
    margin: 8px 0;
    border-bottom: 1px solid #3a005f;
    font-size: 1.1rem;
    display: flex;
    justify-content: space-between;
    color: #e3d2ff;
}

main li strong {
    color: #d6a0ff;
    font-weight: 600;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

::-webkit-scrollbar {
    width: 10px;
}
::-webkit-scrollbar-thumb {
    background: #a200ff;
    border-radius: 5px;
}
::-webkit-scrollbar-track {
    background: #1a0029;
}

</style>

    </style>
</head>
